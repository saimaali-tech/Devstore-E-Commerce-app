apiVersion: apps/v1
kind: Deployment
metadata:
  name: devstore-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devstore-api
  template:
    metadata:
      labels:
        app: devstore-api
    spec:
      containers:
      - name: api
        image: devstore-api:latest
        ports:
        - containerPort: 4000
