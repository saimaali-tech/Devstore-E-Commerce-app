apiVersion: apps/v1
kind: Deployment
metadata:
  name: devstore-api
  namespace: default
  labels:
    app: devstore-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devstore-api
  template:
    metadata:
      labels:
        app: devstore-api
    spec:
      containers:
        - name: api
          image: 517355797272.dkr.ecr.ap-southeast-2.amazonaws.com/devstore-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: devstore-api-service
  namespace: default
spec:
  selector:
    app: devstore-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP