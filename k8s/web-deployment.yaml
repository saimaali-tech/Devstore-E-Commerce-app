apiVersion: apps/v1
kind: Deployment
metadata:
  name: devstore-web
  namespace: default
  labels:
    app: devstore-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devstore-web
  template:
    metadata:
      labels:
        app: devstore-web
    spec:
      containers:
        - name: web
          image: 517355797272.dkr.ecr.ap-southeast-2.amazonaws.com/devstore-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: devstore-web-service
  namespace: default
spec:
  selector:
    app: devstore-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer