# web-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devstore-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devstore-web
  template:
    metadata:
      labels:
        app: devstore-web
    spec:
      containers:
      - name: web
        image: 747549198981.dkr.ecr.ap-southeast-2.amazonaws.com/devstore-web:latest
        ports:
        - containerPort: 3000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devstore-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devstore-api
  template:
    metadata:
      labels:
        app: devstore-api
    spec:
      containers:
      - name: api
        image: 747549198981.dkr.ecr.ap-southeast-2.amazonaws.com/devstore-api:latest
        ports:
        - containerPort: 4000